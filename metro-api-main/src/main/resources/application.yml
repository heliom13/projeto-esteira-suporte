spring:
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:metro;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: ${H2_CONSOLE:true}
  sql:
    init:
      mode: always

message:
  token: ${TOKEN_MESSAGE:token}
